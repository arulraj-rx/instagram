name: Instagram Scheduler

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
    - cron: "12 1 * * *"
    - cron: "24 2 * * *"
    - cron: "36 3 * * *"
    - cron: "48 4 * * *"
    - cron: "0 6 * * *"
    - cron: "12 7 * * *"
    - cron: "24 8 * * *"
    - cron: "36 9 * * *"
    - cron: "48 10 * * *"
    - cron: "0 12 * * *"
    - cron: "12 13 * * *"
    - cron: "24 14 * * *"
    - cron: "36 15 * * *"
    - cron: "48 16 * * *"
    - cron: "0 18 * * *"
    - cron: "12 19 * * *"
    - cron: "24 20 * * *"
    - cron: "36 21 * * *"
    - cron: "48 22 * * *"
  

jobs:
  run-instagram:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 python-dotenv dropbox groq

      - name: Run Instagram workflow
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          META_TOKEN: ${{ secrets.META_TOKEN }}
          IG_ID: ${{ secrets.IG_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_LOG_BOT_TOKEN: ${{ secrets.TELEGRAM_LOG_BOT_TOKEN }}
          TELEGRAM_LOG_CHAT_ID: ${{ secrets.TELEGRAM_LOG_CHAT_ID }}
        run: python main.py
